# Configuração do projeto Supabase (Corpo Feliz / Efeito Lipo).
# project_id = referência do projeto (vem da URL do Supabase).
project_id = "fjlbvoephhextnxemygf"

# Webhook da Hotmart: a Hotmart não faz login, então essa função NÃO pode
# exigir um token de sessão (JWT). A segurança dela é o "hottok" próprio,
# validado dentro do código.
[functions.hotmart-webhook]
verify_jwt = false

# Webhook da Greenn: mesma ideia — a Greenn não faz login, então a função NÃO
# pode exigir JWT. A segurança é o token secreto na URL (?token=...), validado
# dentro do código contra GREENN_WEBHOOK_TOKEN.
[functions.greenn-webhook]
verify_jwt = false
